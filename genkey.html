<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperPing - Key Gen System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root {
    --bg:     #050508;
    --card:   rgba(20,20,25,0.6);
    --accent: #00e5ff;
    --dim:    #00e5ff40;
    --text:   #ffffff;
    --muted:  #94a3b8;
    --red:    #ff2d55;
    --gold:   #ffd700;
    --border: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -2;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    z-index: -1;
    pointer-events: none;
  }

  .card {
    width: 100%; max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    backdrop-filter: blur(24px) saturate(180%);
    box-shadow: 0 0 60px rgba(0,229,255,0.05), inset 0 1px 0 rgba(0,229,255,0.08);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 30px; }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.8rem;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,229,255,0.4);
    letter-spacing: 4px;
    display: block;
    margin-bottom: 4px;
  }
  .tagline {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Section label */
  .sec-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* App card */
  .app-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 22px; }
  .app-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: 0.2s;
    display: flex; align-items: center; gap: 14px;
  }
  .app-card.selected {
    border-color: var(--accent);
    background: rgba(0,229,255,0.06);
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
  }
  .app-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #00e5ff, #0080ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .app-name { font-size: 1rem; font-weight: 700; color: var(--text); }
  .app-desc { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .app-check {
    margin-left: auto;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: 0.2s;
  }
  .app-card.selected .app-check {
    background: var(--accent); border-color: var(--accent);
  }
  .app-card.selected .app-check::after {
    content: '✓'; font-size: 0.65rem; color: #000; font-weight: 900;
  }

  /* Key type */
  .key-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .key-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
  }
  .key-card:hover { border-color: rgba(0,229,255,0.3); }
  .key-card.selected {
    border-color: var(--accent);
    background: rgba(0,229,255,0.06);
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
  }
  .key-card.selected.gold {
    border-color: var(--gold);
    background: rgba(255,215,0,0.06);
    box-shadow: 0 0 20px rgba(255,215,0,0.1);
  }
  .key-links {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
    font-family: 'Share Tech Mono', monospace;
  }
  .key-duration {
    font-size: 1.6rem; font-weight: 700;
    line-height: 1;
    font-family: 'Share Tech Mono', monospace;
  }
  .key-card.selected:not(.gold) .key-duration { color: var(--accent); }
  .key-card.selected.gold .key-duration { color: var(--gold); }
  .key-card:not(.selected) .key-duration { color: var(--muted); }
  .key-sub {
    font-size: 0.68rem; color: var(--muted);
    margin-top: 4px;
  }


  /* Captcha */
  .captcha-wrap {
    margin-bottom: 22px;
    display: flex; justify-content: center;
  }

  /* Button */
  .btn-gen {
    width: 100%;
    padding: 16px;
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #0080ff 100%);
    color: #000;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.2s;
    position: relative; overflow: hidden;
  }
  .btn-gen:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,229,255,0.3); }
  .btn-gen:active { transform: translateY(0); }
  .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-gen .btn-text { position: relative; z-index: 1; }

  /* Result */
  .result {
    margin-top: 20px;
    display: none;
  }
  .result.show { display: block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result-label {
    font-size: 0.62rem; color: var(--muted); letter-spacing: 2px;
    text-transform: uppercase; font-family: 'Share Tech Mono', monospace;
    margin-bottom: 8px;
  }
  .result-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
  }
  .result-url {
    flex: 1; font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem; color: var(--accent);
    word-break: break-all; line-height: 1.5;
  }
  .btn-go {
    padding: 8px 16px;
    background: var(--accent); color: #000;
    border: none; border-radius: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: 0.2s;
  }
  .btn-go:hover { box-shadow: 0 0 15px rgba(0,229,255,0.5); }

  .error-box {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(255,45,85,0.08);
    border: 1px solid rgba(255,45,85,0.3);
    border-radius: 12px;
    font-size: 0.8rem; color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    display: none;
  }
  .error-box.show { display: block; animation: fadeUp 0.3s ease; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 20px 0;
  }

  /* Scan line effect */
  @keyframes scanline {
    0% { top: -5%; }
    100% { top: 105%; }
  }
  .card::after {
    content: '';
    position: absolute;
    left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.15), transparent);
    animation: scanline 4s linear infinite;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="logo">Super Ping</span>
    <span class="tagline">Key Generation System</span>
  </div>

  <!-- App -->
  <div class="sec-label">Chọn ứng dụng</div>
  <div class="app-grid" id="appGrid">
    <div class="app-card selected" data-app="superpingpro" onclick="selectApp(this)">
      <div class="app-icon">⚡</div>
      <div>
        <div class="app-name">Super Ping</div>
      </div>
      <div class="app-check"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Key type -->
  <div class="sec-label">Chọn loại key</div>
  <div class="key-grid">
    <div class="key-card selected" data-links="1" onclick="selectKey(this)">
      <div class="key-links">1 link</div>
      <div class="key-duration">24H</div>
      <div class="key-sub">Miễn phí</div>

    </div>
    <div class="key-card gold" data-links="2" onclick="selectKey(this)">
      <div class="key-links">2 links</div>
      <div class="key-duration">48H</div>
      <div class="key-sub">Miễn phí</div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- Turnstile CAPTCHA -->
  <div class="sec-label">Xác minh</div>
  <div class="captcha-wrap">
    <div class="cf-turnstile"
         data-sitekey="0x4AAAAAACnr7R2GVW9_jntO"
         data-theme="dark"
         data-size="normal">
    </div>
  </div>

  <!-- Button -->
  <button class="btn-gen" id="btnGen" onclick="handleGenerate()">
    <span class="btn-text">[ TẠO KEY ]</span>
  </button>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div class="result" id="resultBox">
    <div class="result-label">Link của bạn</div>
    <div class="result-box">
      <div class="result-url" id="resultUrl"></div>
      <button class="btn-go" onclick="goLink()">MỞ →</button>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = "https://k7m2q9x1a8z4p6.phamlongsoftware.workers.dev";
  let selectedApp   = "superpingpro";
  let selectedLinks = 1;
  let finalUrl      = "";

  function selectApp(el) {
    document.querySelectorAll('.app-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedApp = el.dataset.app;
  }

  function selectKey(el) {
    document.querySelectorAll('.key-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedLinks = parseInt(el.dataset.links);
  }

    async function handleGenerate() {
      const token = document.querySelector('[name="cf-turnstile-response"]')?.value;
      if (!token) {
        showError("Vui lòng xác minh CAPTCHA!");
        return;
      }
    
      const btn = document.getElementById('btnGen');
      btn.disabled = true;
      btn.querySelector('.btn-text').innerHTML = '<span class="spinner"></span>ĐANG TẠO...';
      hideError();
      document.getElementById('resultBox').classList.remove('show');
    
      try {
    
        const res = await fetch(
          `${WORKER_URL}?links=${selectedLinks}&token=${encodeURIComponent(token)}`
        );
    
        const data = await res.json();
    
        if (!res.ok || !data.url) {
          throw new Error(data.message || "Lỗi server");
        }
    
        finalUrl = data.url;
        document.getElementById('resultUrl').textContent = finalUrl;
        document.getElementById('resultBox').classList.add('show');
    
      } catch (e) {
        showError("❌ " + (e.message || "Không thể tạo key. Thử lại!"));
      } finally {
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = '[ TẠO KEY ]';
        if (window.turnstile) turnstile.reset();
      }
    }

  function goLink() {
    if (finalUrl) window.open(finalUrl, '_blank');
  }

  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('errorBox').classList.remove('show');
  }
</script>
</body>
</html>
